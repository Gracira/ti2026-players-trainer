<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Кто этот игрок?</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div>
          <p class="eyebrow">The International 2026</p>
          <h1>Кто этот игрок?</h1>
        </div>
        <div class="scoreboard" aria-label="Стопки карточек" aria-live="polite">
          <button class="score-card is-active" type="button" data-view="all">
            <span id="positionCount">0/0</span>
            <small>карточка</small>
          </button>
          <button class="score-card" type="button" data-view="known">
            <span id="knownCount">0</span>
            <small>знал</small>
          </button>
          <button class="score-card" type="button" data-view="learning">
            <span id="learningCount">0</span>
            <small>не знал</small>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="Фильтры">
        <label class="control">
          <span>Поиск</span>
          <input id="searchInput" type="search" placeholder="Ник, имя">
        </label>
        <label class="control">
          <span>Роль</span>
          <select id="roleFilter"></select>
        </label>
        <label class="control">
          <span>Регион</span>
          <select id="regionFilter"></select>
        </label>
        <div class="actions" aria-label="Действия">
          <button id="shuffleButton" type="button">Перемешать</button>
          <button id="resetButton" type="button">Сбросить</button>
        </div>
      </section>

      <section class="trainer-toolbar" aria-label="Ответ">
        <div class="trainer-actions">
          <button id="prevButton" class="ghost-button" type="button">Назад</button>
          <button id="revealButton" class="ghost-button" type="button">Показать ответ</button>
          <button id="knownButton" class="mark-button mark-button--known" type="button" aria-pressed="false">Знал</button>
          <button id="learningButton" class="mark-button mark-button--learning" type="button" aria-pressed="false">Не знал</button>
        </div>
      </section>

      <section class="study-layout">
        <section id="trainer" class="trainer" aria-label="Тренажер карточек">
          <article id="flashcard" class="flashcard is-hidden">
            <button id="cardButton" class="flashcard__button" type="button">
              <div id="portrait" class="flashcard__portrait"></div>
              <span id="cardHint" class="card-hint">Нажми, чтобы открыть ответ</span>
            </button>
          </article>

          <aside class="info-panel">
            <div class="info-panel__top">
              <span id="roleName" class="role-pill"></span>
            </div>
            <div class="answer-box">
              <span id="answerHint">Ответ</span>
              <small id="answerFullName" class="answer-name"></small>
              <div class="answer-main">
                <strong id="answerNick">?</strong>
                <button id="inlineRevealButton" class="inline-reveal-button" type="button">Показать ответ</button>
                <span id="answerTeam" class="answer-team" hidden>
                  <img id="answerTeamLogo" alt="" referrerpolicy="no-referrer">
                  <span id="answerTeamName"></span>
                </span>
              </div>
            </div>
            <div id="infoRows" class="info-rows"></div>
          </aside>
        </section>
      </section>

      <section id="emptyState" class="empty-state" hidden>
        Нет карточек по выбранным фильтрам.
      </section>
    </main>

    <footer class="site-footer">
      <span>Данные: <a href="https://liquipedia.net/dota2/The_International/2026" rel="noreferrer">Liquipedia Dota 2 Wiki</a>.</span>
    </footer>

    <script src="./app.js" type="module"></script>
  </body>
</html>
