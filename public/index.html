<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TI 2026 Players Trainer</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div>
          <p class="eyebrow">The International 2026</p>
          <h1>Карточки игроков</h1>
        </div>
        <div class="scoreboard" aria-live="polite">
          <div>
            <span id="positionCount">0/0</span>
            <small>карточка</small>
          </div>
          <div>
            <span id="knownCount">0</span>
            <small>знал</small>
          </div>
          <div>
            <span id="learningCount">0</span>
            <small>не знал</small>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="Фильтры">
        <label class="control">
          <span>Поиск</span>
          <input id="searchInput" type="search" placeholder="Ник, имя, команда">
        </label>
        <label class="control">
          <span>Команда</span>
          <select id="teamFilter"></select>
        </label>
        <label class="control">
          <span>Роль</span>
          <select id="roleFilter"></select>
        </label>
        <label class="control">
          <span>Регион</span>
          <select id="regionFilter"></select>
        </label>
        <div class="actions" aria-label="Действия">
          <button id="shuffleButton" type="button">Перемешать</button>
          <button id="resetButton" type="button">Сбросить</button>
        </div>
      </section>

      <nav class="tabs" aria-label="Стопки карточек">
        <button class="tab is-active" type="button" data-view="all">Все</button>
        <button class="tab" type="button" data-view="known">Знал</button>
        <button class="tab" type="button" data-view="learning">Не знал</button>
      </nav>

      <section class="study-layout">
        <aside class="deck-panel" aria-label="Список карточек">
          <div class="deck-panel__top">
            <strong>Список</strong>
            <span id="visibleCount">0</span>
          </div>
          <div id="deckList" class="deck-list"></div>
        </aside>

        <section id="trainer" class="trainer" aria-label="Тренажер карточек">
          <article id="flashcard" class="flashcard is-hidden">
            <button id="cardButton" class="flashcard__button" type="button">
              <div id="portrait" class="flashcard__portrait"></div>
              <span id="cardHint" class="card-hint">Нажми, чтобы открыть ответ</span>
            </button>
          </article>

          <aside class="info-panel">
            <div class="info-panel__top">
              <span id="teamName" class="team-pill"></span>
              <span id="roleName" class="role-pill"></span>
            </div>
            <div class="answer-box">
              <span id="answerHint">Ответ</span>
              <strong id="answerNick">?</strong>
              <small id="answerSub"></small>
            </div>
            <div id="infoRows" class="info-rows"></div>
          </aside>
        </section>
      </section>

      <section class="trainer-actions" aria-label="Ответ">
        <button id="prevButton" type="button">Назад</button>
        <button id="revealButton" type="button">Показать ник</button>
        <button id="knownButton" type="button">Знал</button>
        <button id="learningButton" type="button">Не знал</button>
      </section>

      <section id="emptyState" class="empty-state" hidden>
        В этой стопке пока пусто.
      </section>
    </main>

    <footer class="site-footer">
      <span>Данные: <a href="https://liquipedia.net/dota2/The_International/2026" rel="noreferrer">Liquipedia Dota 2 Wiki</a>.</span>
    </footer>

    <script src="./app.js" type="module"></script>
  </body>
</html>
