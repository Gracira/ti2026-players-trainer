<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Кто этот игрок?</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="topbar__title">
          <p class="eyebrow">The International 2026</p>
          <h1>Кто этот игрок?</h1>
        </div>
        <div class="scoreboard" aria-label="Счет тренировки" aria-live="polite">
          <button class="score-card is-active" type="button" data-view="all">
            <span id="positionCount">0/0</span>
            <small>карта</small>
          </button>
          <button class="score-card" type="button" data-view="known">
            <span id="knownCount">0</span>
            <small>верно</small>
          </button>
          <button class="score-card" type="button" data-view="learning">
            <span id="learningCount">0</span>
            <small>ошибки</small>
          </button>
          <div class="score-card score-card--streak">
            <span id="streakCount">0</span>
            <small>стрик</small>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="Фильтры">
        <label class="control">
          <span>Роль</span>
          <select id="roleFilter"></select>
        </label>
        <label class="control">
          <span>Регион</span>
          <select id="regionFilter"></select>
        </label>
        <div class="actions" aria-label="Действия">
          <button id="shuffleButton" type="button">Перемешать</button>
          <button id="resetButton" type="button">Сбросить</button>
        </div>
      </section>

      <section id="progressList" class="progress-list" hidden></section>

      <section class="trainer-toolbar" aria-label="Карточка">
        <div class="trainer-actions">
          <button id="prevButton" class="ghost-button" type="button">Назад</button>
          <button id="revealButton" class="ghost-button" type="button">Сдаться</button>
          <button id="nextButton" class="mark-button mark-button--known" type="button" hidden>Дальше</button>
        </div>
      </section>

      <section class="study-layout">
        <section id="trainer" class="trainer" aria-label="Тренажер карточек">
          <article id="flashcard" class="flashcard">
            <div class="flashcard__frame">
              <div id="portrait" class="flashcard__portrait"></div>
            </div>
          </article>

          <aside class="info-panel">
            <div class="info-panel__top">
              <span id="roleName" class="role-pill"></span>
            </div>
            <div class="answer-box">
              <span id="answerHint">Ответ скрыт</span>
              <small id="answerFullName" class="answer-name"></small>
              <div class="answer-main">
                <strong id="answerNick">?</strong>
                <span id="answerTeam" class="answer-team" hidden>
                  <img id="answerTeamLogo" alt="" referrerpolicy="no-referrer">
                  <span id="answerTeamName"></span>
                </span>
              </div>
            </div>

            <form id="guessForm" class="guess-form" autocomplete="off">
              <label for="guessInput">Ник игрока</label>
              <div class="guess-field">
                <div class="guess-row">
                  <input id="guessInput" type="text" inputmode="text" autocomplete="off" placeholder="Введи ник или имя" aria-controls="guessSuggestions" aria-autocomplete="list">
                  <button id="guessButton" type="submit">Проверить</button>
                </div>
                <div id="guessSuggestions" class="guess-suggestions" role="listbox" aria-label="Подсказки ников" hidden></div>
              </div>
              <p id="guessFeedback" class="guess-feedback" aria-live="polite"></p>
            </form>

            <div id="infoRows" class="info-rows"></div>
          </aside>
        </section>
      </section>

      <section id="emptyState" class="empty-state" hidden>
        Нет карточек по выбранным фильтрам.
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
